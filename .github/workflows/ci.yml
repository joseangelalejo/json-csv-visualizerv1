name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build (Next.js)
        run: npm run build --if-present

      - name: Run unit tests
        run: |
          if npm run test --silent; then echo "unit tests OK"; else echo "no unit tests or failed"; fi
        continue-on-error: true

      - name: Install Playwright browsers (for E2E)
        run: npx playwright install --with-deps
        continue-on-error: true

      - name: Run Playwright E2E (optional)
        run: npx playwright test --reporter=list
        continue-on-error: true

  docker-logdir-check:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t json-csv-visualizer:ci .

      - name: Prepare host folder to simulate a root-owned mounted volume
        run: |
          mkdir -p $GITHUB_WORKSPACE/ci-logs
          sudo chown root:root $GITHUB_WORKSPACE/ci-logs || true
          chmod 700 $GITHUB_WORKSPACE/ci-logs || true
          ls -ld $GITHUB_WORKSPACE/ci-logs

      - name: Run container and attempt to write to mounted /app/logs
        env:
          LOG_FILE: /app/logs/app.log
        run: |
          # run the container (entrypoint will attempt to fix ownership/permissions)
          docker run --rm -v $GITHUB_WORKSPACE/ci-logs:/app/logs:rw -e LOG_FILE=/app/logs/app.log json-csv-visualizer:ci \
            sh -c 'echo "ci-check" > /app/logs/ci.out && ls -la /app/logs && whoami'

      - name: Verify host directory received file and is writable
        run: |
          ls -la $GITHUB_WORKSPACE/ci-logs
          test -f $GITHUB_WORKSPACE/ci-logs/ci.out
          test -w $GITHUB_WORKSPACE/ci-logs
